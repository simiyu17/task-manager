version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: task-manager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: task_manager_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task-manager-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d task_manager_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Keycloak 26.5.2 - Identity and Access Management
  keycloak:
    image: quay.io/keycloak/keycloak:26.0.5
    container_name: task-manager-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: postgres
      KC_DB_SCHEMA: public
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      KC_METRICS_ENABLED: true
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - task-manager-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080;echo -e 'GET /health/ready HTTP/1.1\r\nhost: http://localhost\r\nConnection: close\r\n\r\n' >&3;if [ $? -eq 0 ]; then echo 'Healthcheck Successful';exit 0;else echo 'Healthcheck Failed';exit 1;fi;"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # Spring Boot Backend
  backend:
    build:
      context: ./task-manager-backend
      dockerfile: Dockerfile
    image: task-manager-backend:latest
    container_name: task-manager-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: 5432
      POSTGRESQL_DATABASE: task_manager_db
      POSTGRESQL_USER: root
      POSTGRESQL_PASSWORD: postgres
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/task-manager
      FILE_UPLOAD_DIR: /app/uploads
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -XX:+OptimizeStringConcat
        -XX:+UseStringDeduplication
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8082:8082"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - task-manager-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8082/task-manager/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s

  # Angular 21 Frontend
  frontend:
    build:
      context: ./task-manager-frontend
      dockerfile: Dockerfile
      args:
        - NODE_VERSION=22
    image: task-manager-frontend:latest
    container_name: task-manager-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_URL=http://localhost:8082/task-manager
      - KEYCLOAK_URL=http://localhost:8080
      - KEYCLOAK_REALM=task-manager
      - KEYCLOAK_CLIENT_ID=task-manager-client
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - task-manager-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
    driver: local
    name: task-manager-postgres-data
  keycloak_data:
    driver: local
    name: task-manager-keycloak-data
  backend_uploads:
    driver: local
    name: task-manager-backend-uploads

networks:
  task-manager-network:
    driver: bridge
    name: task-manager-network

