databaseChangeLog:
  - changeSet:
      id: 005-add-review-comments-table
      author: system
      changes:

        - createTable:
            tableName: review_comments
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_review_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_review_comment_task_review
                    references: task_reviews(id)
              - column:
                  name: comment_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: commenter_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: section_reference
                  type: VARCHAR(255)
              - column:
                  name: date_created
                  type: TIMESTAMP
              - column:
                  name: last_modified
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
              - column:
                  name: data_status
                  type: VARCHAR(50)


