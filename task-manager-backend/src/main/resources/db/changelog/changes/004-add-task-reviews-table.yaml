databaseChangeLog:
  - changeSet:
      id: 004-add-task-reviews-table
      author: system
      changes:
        - createTable:
            tableName: task_reviews
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_task_review_task
                    references: tasks(id)
              - column:
                  name: reviewer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: reviewer_email
                  type: VARCHAR(255)
              - column:
                  name: review_status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: review_cycle
                  type: INTEGER
              - column:
                  name: reviewed_at
                  type: TIMESTAMP
              - column:
                  name: overall_comment
                  type: TEXT
              - column:
                  name: date_created
                  type: TIMESTAMP
              - column:
                  name: last_modified
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
              - column:
                  name: data_status
                  type: VARCHAR(50)
