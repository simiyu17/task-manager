databaseChangeLog:
  - changeSet:
      id: 012-add-notes-columns-to-tasks
      author: system
      changes:
        - addColumn:
            tableName: tasks
            columns:
              - column:
                  name: allocate_notes
                  type: TEXT
                  remarks: "Notes added during task allocation"
              - column:
                  name: acceptance_notes
                  type: TEXT
                  remarks: "Notes added when task is accepted"
              - column:
                  name: rejection_notes
                  type: TEXT
                  remarks: "Notes added when task is rejected"

