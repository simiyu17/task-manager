databaseChangeLog:
  - changeSet:
      id: 007-create-donors-table
      author: admin
      changes:
        - createSequence:
            sequenceName: donors_seq
            startValue: 1
            incrementBy: 50

        - createTable:
            tableName: donors
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: donor_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email_address
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: contact_number
                  type: VARCHAR(255)
              - column:
                  name: date_created
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_modified
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
              - column:
                  name: data_status
                  type: VARCHAR(50)

        - addUniqueConstraint:
            tableName: donors
            columnNames: donor_name
            constraintName: DONOR_NAME_UNIQUE

        - addUniqueConstraint:
            tableName: donors
            columnNames: email_address
            constraintName: DONOR_EMAIL_UNIQUE

      rollback:
        - dropTable:
            tableName: donors
        - dropSequence:
            sequenceName: donors_seq

