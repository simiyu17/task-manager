databaseChangeLog:
  - changeSet:
      id: 006-add-clarifying-questions-table
      author: system
      changes:
        - createTable:
            tableName: clarifying_questions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_review_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_clarifying_question_task_review
                    references: task_reviews(id)
              - column:
                  name: question_text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: questioner_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: answer_text
                  type: TEXT
              - column:
                  name: answered_by
                  type: VARCHAR(255)
              - column:
                  name: is_answered
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: date_created
                  type: TIMESTAMP
              - column:
                  name: last_modified
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
              - column:
                  name: data_status
                  type: VARCHAR(50)
