databaseChangeLog:
  - changeSet:
      id: 010-add-missing-sequences-for-reviews-comments-questions
      author: system
      changes:
        - createSequence:
            sequenceName: task_reviews_seq
            startValue: 1
            incrementBy: 50

        - createSequence:
            sequenceName: review_comments_seq
            startValue: 1
            incrementBy: 50

        - createSequence:
            sequenceName: clarifying_questions_seq
            startValue: 1
            incrementBy: 50

      rollback:
        - dropSequence:
            sequenceName: task_reviews_seq
        - dropSequence:
            sequenceName: review_comments_seq
        - dropSequence:
            sequenceName: clarifying_questions_seq

