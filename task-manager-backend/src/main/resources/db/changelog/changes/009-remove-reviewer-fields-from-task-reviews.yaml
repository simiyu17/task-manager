databaseChangeLog:
  - changeSet:
      id: 009-remove-reviewer-fields-from-task-reviews
      author: system
      changes:
        - dropColumn:
            tableName: task_reviews
            columnName: reviewer_name
        - dropColumn:
            tableName: task_reviews
            columnName: reviewer_email
      rollback:
        - addColumn:
            tableName: task_reviews
            columns:
              - column:
                  name: reviewer_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: reviewer_email
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

