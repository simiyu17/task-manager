<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header>
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <strong>Create Donor</strong>
            <button 
              type="button" 
              cButton 
              color="link"
              size="sm"
              class="ms-2"
              (click)="goBack()">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-left me-1" viewBox="0 0 16 16">
                <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
              </svg>
              Back to Donors
            </button>
          </div>
        </div>
      </c-card-header>
      <c-card-body>
        <!-- Success Message -->
        <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-check-circle me-2" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/>
            <path d="m10.97 4.97-.02.022-3.473 4.425-2.093-2.094a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-1.071-1.05"/>
          </svg>
          {{ successMessage }}
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-exclamation-triangle me-2" viewBox="0 0 16 16">
            <path d="M7.938 2.016A.13.13 0 0 1 8.002 2a.13.13 0 0 1 .063.016.15.15 0 0 1 .054.057l6.857 11.667c.036.06.035.124.002.183a.2.2 0 0 1-.054.06.1.1 0 0 1-.066.017H1.146a.1.1 0 0 1-.066-.017.2.2 0 0 1-.054-.06.18.18 0 0 1 .002-.183L7.884 2.073a.15.15 0 0 1 .054-.057m1.044-.45a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767z"/>
            <path d="M7.002 12a1 1 0 1 1 2 0 1 1 0 0 1-2 0M7.1 5.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/>
          </svg>
          {{ errorMessage }}
        </div>

        <!-- Form -->
        <form cForm [formGroup]="donorForm" (ngSubmit)="onSubmit()">
          <c-row class="mb-3">
            <c-col md="6">
              <label cLabel for="donorName">Donor Name <span class="text-danger">*</span></label>
              <input 
                cFormControl 
                id="donorName"
                type="text" 
                formControlName="donorName"
                placeholder="Enter donor name"
                [class.is-invalid]="f['donorName'].invalid && f['donorName'].touched"
                [class.is-valid]="f['donorName'].valid && f['donorName'].touched">
              <c-form-feedback *ngIf="f['donorName'].invalid && f['donorName'].touched" [valid]="false">
                Donor name is required
              </c-form-feedback>
            </c-col>
          </c-row>

          <c-row class="mb-3">
            <c-col md="6">
              <label cLabel for="emailAddress">Email Address <span class="text-danger">*</span></label>
              <input 
                cFormControl 
                id="emailAddress"
                type="email" 
                formControlName="emailAddress"
                placeholder="Enter email address"
                [class.is-invalid]="f['emailAddress'].invalid && f['emailAddress'].touched"
                [class.is-valid]="f['emailAddress'].valid && f['emailAddress'].touched">
              <c-form-feedback *ngIf="f['emailAddress'].invalid && f['emailAddress'].touched" [valid]="false">
                <span *ngIf="f['emailAddress'].errors?.['required']">Email address is required</span>
                <span *ngIf="f['emailAddress'].errors?.['email']">Email address must be valid</span>
              </c-form-feedback>
            </c-col>
          </c-row>

          <c-row class="mb-3">
            <c-col md="6">
              <label cLabel for="contactNumber">Contact</label>
              <input 
                cFormControl 
                id="contactNumber"
                type="text" 
                formControlName="contactNumber"
                placeholder="Enter contact number">
            </c-col>
          </c-row>

          <c-row class="mt-4">
            <c-col>
              <button 
                type="submit" 
                cButton 
                color="primary"
                [disabled]="isSubmitting">
                <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                {{ isSubmitting ? 'Creating...' : 'Create Donor' }}
              </button>
              <button 
                type="button" 
                cButton 
                color="secondary"
                class="ms-2"
                (click)="onCancel()"
                [disabled]="isSubmitting">
                Cancel
              </button>
            </c-col>
          </c-row>
        </form>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
