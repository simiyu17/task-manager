server {
    server_name task360.iced-eval.org;

    client_max_body_size 200M;
    client_header_buffer_size 64k;
    large_client_header_buffers 4 64k;
    
    location / {
        proxy_pass http://127.0.0.1:5858;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

 # Proxy to Spring Boot API
    location /api/ {
        proxy_pass http://localhost:8082/task-manager/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Proxy to Keycloak
    location /auth/ {
        proxy_pass http://localhost:7070; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        
        # Ensure only ONE of these exists (remove the 'Force HTTPS' line if it's separate)
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;

    }
    # --- SSL listen (no ipv6only=on to avoid duplicate listen options) ---
    listen 443 ssl;            # managed by Certbot
    listen [::]:443 ssl;       # managed by Certbot

    # --- Certificates (fresh base lineage) ---
    ssl_certificate     /etc/letsencrypt/live/task360.iced-eval.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/task360.iced-eval.org/privkey.pem;   # managed by Certbot

    # --- Security defaults by Certbot ---
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;   # managed by Certbot
}

server {
    # Redirect ONLY task360 → https
    if ($host = task360.iced-eval.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name task360.iced-eval.org;

    return 404; # managed by Certbot
}
