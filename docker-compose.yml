# Task Manager Application Stack
# External PostgreSQL on host (use init-postgres.sh to setup)
services:
  # Keycloak 26.0.5 Authentication Service
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    container_name: keycloak
    # Use 'start' for production; 'start-dev' ignores some proxy settings
    command: 
      - start 
      - --optimized 
      - --http-relative-path=/auth
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-keycloak_password}
      KC_HOSTNAME: ${DOMAIN}
      KC_HOSTNAME_STRICT: false
      KC_HTTP_ENABLED: true
      KC_HEALTH_ENABLED: true
      # Critical for Nginx to pass SSL info correctly
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - task-manager-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.task-manager.service=authentication"
      - "com.task-manager.version=26.5.2"
  # Spring Boot 3.5.10 Backend API
  task-manager-api:
    build:
      context: https://github.com/simiyu17/task-manager.git#main:task-manager-backend
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: task-manager-api
    environment:
      # PostgreSQL Database Configuration
      POSTGRESQL_HOST: host.docker.internal
      POSTGRESQL_PORT: ${POSTGRESQL_PORT:-5432}
      POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE:-taskmanager}
      POSTGRESQL_USER: ${POSTGRESQL_USER:-taskmanager}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD:-taskmanager_password}
      
      # Keycloak Configuration
      KEY_CLOAK_ISSUER_URI: ${KEY_CLOAK_ISSUER_URI}
      KEYCLOAK_AUTH_SERVER_URL: ${KEY_CLOAK_ISSUER_URI}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-task-manager}
      KEYCLOAK_RESOURCE: ${KEYCLOAK_RESOURCE_API:-task-manager-api-client}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - task-manager-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/task-manager/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./task-manager-uploads:/app/task-uploads
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.task-manager.service=backend-api"
      - "com.task-manager.version=3.5.10"
  # Angular 21 Frontend
  task-manager-ui:
    build:
      context: https://github.com/simiyu17/task-manager.git#main:task-manager-ui
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: task-manager-ui
    ports:
      - "3000:80"
    environment:
      # Angular Runtime Environment Variables
      # These are injected at container startup via env-config.js
      ANGULAR_API_BASE_URL: "https://${DOMAIN}/api/"
      ANGULAR_AUTH_BASE_URL: "https://${DOMAIN}/auth/"
      ANGULAR_AUTH_REALM_NAME: "${KEYCLOAK_REALM:-task-manager}"
      ANGULAR_AUTH_CLIENT_ID: "${KEYCLOAK_RESOURCE_UI:-task-manager-ui-client}"
      ANGULAR_API_TIMEOUT: "30000"
    depends_on:
      task-manager-api:
        condition: service_healthy
    networks:
      - task-manager-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.task-manager.service=frontend-ui"
      - "com.task-manager.version=21"
networks:
  task-manager-network:
    driver: bridge
