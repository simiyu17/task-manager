services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.2
    command: 
      - start-dev 
      - --import-realm
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://host.docker.internal:5433/keycloak_db
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: postgres
    volumes:
      - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro
   
