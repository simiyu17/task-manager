databaseChangeLog:
  - changeSet:
      id: 003-create-document-table
      author: admin
      changes:
        - createSequence:
            sequenceName: documents_seq
            startValue: 1
            incrementBy: 50

        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: task_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: document_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: file_path
                  type: VARCHAR(500)
              - column:
                  name: file_location
                  type: VARCHAR(500)
              - column:
                  name: is_final
                  type: BOOLEAN
                  defaultValueBoolean: false
              - column:
                  name: uploaded_by
                  type: VARCHAR(255)
              - column:
                  name: uploaded_at
                  type: TIMESTAMP
              - column:
                  name: date_created
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_modified
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
              - column:
                  name: data_status
                  type: VARCHAR(50)

        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: task_id
            constraintName: fk_documents_task
            referencedTableName: tasks
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: CASCADE

        - addUniqueConstraint:
            tableName: documents
            columnNames: task_id, version, document_type
            constraintName: UNIQUE_DOCUMENT

      rollback:
        - dropTable:
            tableName: documents
        - dropSequence:
            sequenceName: documents_seq

