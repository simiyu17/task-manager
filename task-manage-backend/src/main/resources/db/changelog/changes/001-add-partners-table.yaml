databaseChangeLog:
  - changeSet:
      id: 001-create-partners-table
      author: admin
      changes:
        - createSequence:
            sequenceName: partners_seq
            startValue: 1
            incrementBy: 50

        - createTable:
            tableName: partners
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: partner_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_created
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: last_modified
                  type: TIMESTAMP
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: last_modified_by
                  type: VARCHAR(255)
              - column:
                  name: data_status
                  type: VARCHAR(50)

        - addUniqueConstraint:
            tableName: partners
            columnNames: partner_name
            constraintName: NAME_UNIQUE

      rollback:
        - dropTable:
            tableName: partners
        - dropSequence:
            sequenceName: partners_seq
